<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Earth I Saw - Command Center</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;800&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000; height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; display: flex; justify-content: center; }
        #app-container { width: 100%; height: 100%; max-width: 600px; background: #050505; position: relative; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .top-nav { height: 60px; background: #050505; border-bottom: 2px solid #ff3d00; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0; z-index: 100; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .nav-left { display: flex; align-items: center; gap: 15px; }
        .menu-btn { font-size: 24px; color: #ff3d00; cursor: pointer; background: none; border: none; transition: 0.2s; }
        .menu-btn:active { transform: scale(0.9); }
        .home-btn { font-size: 20px; cursor: pointer; background: none; border: none; transition: 0.2s; }
        .home-btn:active { transform: scale(0.9); }
        .nav-right { font-size: 10px; color: #8b949e; font-family: 'Space Grotesk', sans-serif; font-weight: 800; letter-spacing: 1.5px; display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .status-dot { width: 8px; height: 8px; background: #8b949e; border-radius: 50%; display: inline-block; transition: 0.3s; }
        .status-dot.online { background: #4caf50; box-shadow: 0 0 8px rgba(76, 175, 80, 0.6); }
        .status-dot.offline { background: #ff3d00; box-shadow: 0 0 8px rgba(255, 61, 0, 0.6); }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 250; opacity: 0; pointer-events: none; transition: 0.3s ease; }
        .overlay.active { opacity: 1; pointer-events: all; }
        .sidebar { position: absolute; top: 0; left: -280px; width: 280px; height: 100%; background: #0a0a0a; z-index: 300; transition: 0.3s ease; display: flex; flex-direction: column; border-right: 1px solid #1a1a1a; }
        .sidebar.active { left: 0; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: #050505; border-bottom: 2px solid #ff3d00; }
        .sidebar-title { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: 2px; }
        .close-btn { background: transparent; border: none; color: #8b949e; font-size: 22px; cursor: pointer; transition: 0.2s; }
        .close-btn:hover { color: #ff3d00; }
        .sidebar-menu { display: flex; flex-direction: column; padding: 15px 0; }
        .sidebar-link { padding: 18px 25px; color: #e6edf3; text-decoration: none; font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 15px; transition: 0.2s; cursor: pointer; border-left: 3px solid transparent; border-bottom: 1px solid #1a1a1a; }
        .sidebar-link:hover { background: #111; color: #ff3d00; border-left-color: #ff3d00; }
        .frame-container { flex: 1; position: relative; overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100%; border: none; background: transparent; transition: opacity 0.2s; }
    </style>
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
</head>
<body>
    <div id="app-container">
        <div class="top-nav">
            <div class="nav-left">
                <button class="menu-btn" onclick="toggleSidebar()">☰</button>
                <button class="home-btn" onclick="triggerModuleLoad('mission-stats')">🏠</button>
            </div>
            <div class="nav-right" onclick="triggerCloudSync()" title="Click to Connect Google Drive">
                <span class="status-dot" id="cloud-status-dot"></span> 
                <span id="cloud-status-text">OFFLINE</span>
            </div>
        </div>

        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">Menu</div>
                <button class="close-btn" onclick="toggleSidebar()">✕</button>
            </div>
            <div class="sidebar-menu">
                <div class="sidebar-link" onclick="triggerModuleLoad('mission-stats')"><span>🎯</span> Mission Stats</div>
                <div class="sidebar-link" onclick="triggerModuleLoad('bag-layouts')"><span>🎒</span> Bag Layouts</div>
                <div class="sidebar-link" onclick="triggerModuleLoad('gear-vault')"><span>🎥</span> Gear Vault</div>
                <div class="sidebar-link" onclick="triggerModuleLoad('wishlist')"><span>🛒</span> Wishlist</div>
                <div class="sidebar-link" onclick="triggerModuleLoad('control-panel')" style="border-bottom: none;"><span>⚙️</span> Control Panel</div>
            </div>
        </div>
        
        <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

        <div class="frame-container">
            <iframe id="module-frame" src="modules/mission-stats/ui.html"></iframe>
        </div>
    </div>

    <script src="core/cloud-sync-engine.js"></script>
    <script src="app.js"></script>
    
    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
        
        function triggerModuleLoad(moduleName) {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
            const frame = document.getElementById('module-frame');
            frame.style.opacity = '0';
            setTimeout(() => {
                frame.src = `modules/${moduleName}/ui.html`;
                frame.onload = () => frame.style.opacity = '1';
            }, 200);
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js');
            });
        }
    </script>
</body>
</html>
