<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;800&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="module-header">
        <div class="module-title">⚙️ Control Panel</div>
    </div>

    <div class="control-container">
        
        <div class="tab-menu">
            <button class="tab-btn active" onclick="switchTab('mission-tab')">🎯 Mission</button>
            <button class="tab-btn" onclick="switchTab('backup-tab')">💾 Backup</button>
            <button class="tab-btn" onclick="switchTab('bags-tab')">🎒 Bags</button>
            <button class="tab-btn" onclick="switchTab('gear-tab')">🎥 Gear</button>
        </div>

        <!-- Mission Tab -->
        <div class="tab-content active" id="mission-tab">
            <div class="setting-box">
                <div class="setting-title">Update Mission Stats</div>
                <div class="input-group"><label>Total Kilometers</label><input type="number" id="input-km" placeholder="e.g. 16500"></div>
                <div class="input-group"><label>Total Countries</label><input type="number" id="input-countries" placeholder="e.g. 2"></div>
                <div class="input-group"><label>Current Days</label><input type="number" id="input-days" placeholder="e.g. 105"></div>
                <button class="btn-submit" onclick="saveMissionData()">Save Updates</button>
            </div>
        </div>

        <!-- Backup & Restore Tab (NEW) -->
        <div class="tab-content" id="backup-tab">
            <div class="setting-box">
                <div class="setting-title" style="color: #4caf50;">Offline Data Protection</div>
                <p style="font-size: 11px; color: #8b949e; margin-bottom: 15px; line-height: 1.5;">
                    Download a secure offline copy of your entire app data. You can restore it anytime if the app gets uninstalled or if you change devices.
                </p>
                
                <button class="btn-submit" style="background: #4caf50; margin-bottom: 15px;" onclick="triggerDownload()">
                    📥 Download Offline Backup
                </button>

                <div class="input-group" style="margin-top: 20px; border-top: 1px dashed #333; padding-top: 15px;">
                    <label>Restore From Backup File</label>
                    <input type="file" id="backupFileInput" accept=".json" onchange="triggerRestore(event)" style="padding: 10px; background: #1a1a1a;">
                </div>
            </div>
        </div>

        <!-- Bags Tab -->
        <div class="tab-content" id="bags-tab">
            <div class="setting-box">
                <div class="setting-title">Add New Backpack</div>
                <div class="input-group"><label>Bag Brand & Name</label><input type="text" id="newBagName" placeholder="e.g. Naturehike"></div>
                <div class="input-group"><label>Capacity</label><input type="text" id="newBagCapacity" placeholder="e.g. 75L"></div>
                <div class="input-group"><label>Upload Bag Image</label><input type="file" id="newBagImage" accept="image/png, image/jpeg"></div>
                <button class="btn-submit" onclick="addNewBag()">➕ Add Bag to System</button>
            </div>
            <div class="setting-box">
                <div class="setting-title">Current Bags in Database</div>
                <div class="admin-list" id="adminBagList"></div>
            </div>
        </div>

        <!-- Gear Vault Tab -->
        <div class="tab-content" id="gear-tab">
            <div class="setting-box">
                <div class="setting-title">Add New Gear Category</div>
                <div class="input-group"><label>Category Name</label><input type="text" id="newGearCatName" placeholder="e.g. Drones"></div>
                <div class="input-group"><label>Upload Cover Image</label><input type="file" id="newGearCatImage" accept="image/png, image/jpeg"></div>
                <button class="btn-submit" onclick="addNewGearCategory()">➕ Add Category</button>
            </div>
            <div class="setting-box">
                <div class="setting-title">Current Vault Categories</div>
                <div class="admin-list" id="adminGearList"></div>
            </div>
        </div>

    </div>
    <script src="logic.js"></script>
</body>
</html>
