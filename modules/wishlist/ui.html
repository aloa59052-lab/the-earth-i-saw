<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;800&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="module-header">
        <div class="header-left">
            <div class="back-btn" onclick="handleBackButton()">←</div>
            <div class="module-title">Wishlist</div>
        </div>
    </div>

    <!-- মূল বডি -->
    <div class="wishlist-container" id="mainWishlistContainer">
        <div class="empty-message">
            Loading wishlist...
        </div>
    </div>

    <!-- Wishlist Modal (পপ-আপ) -->
    <div id="wishlistModal" class="modal-overlay">
        <div class="modal-content">
            <h3 class="modal-title">Add to Wishlist</h3>
            <div class="input-group">
                <label>Item Name / Model</label>
                <input type="text" id="itemName" placeholder="e.g. Sony A7S III or DJI Mic 2">
            </div>
            <div class="input-group">
                <label>Estimated Price ($)</label>
                <input type="number" id="itemPrice" placeholder="e.g. 3500">
            </div>
            <div class="input-group">
                <label>Priority Level</label>
                <select id="itemPriority" class="custom-select">
                    <option value="High">🔴 High (Need ASAP)</option>
                    <option value="Medium">🟡 Medium (Good to have)</option>
                    <option value="Low">🟢 Low (Future plan)</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal('wishlistModal')">Cancel</button>
                <button class="btn-save" onclick="saveWishlistItem()">Save Item</button>
            </div>
        </div>
    </div>

    <script src="logic.js"></script>
</body>
</html>
