<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;800&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="module-header">
        <div class="header-left">
            <div class="back-btn" onclick="handleBackButton()">←</div>
            <div class="module-title">Bag Layouts</div>
        </div>
    </div>

    <div class="bag-selector" id="bagTabsContainer">
        <!-- JS দিয়ে ডাইনামিকভাবে ব্যাগ আসবে -->
    </div>

    <div class="layout-container" id="mainLayoutContainer">
        <div class="empty-message">
            Loading bag data...
        </div>
    </div>

    <!-- Compartment Modal -->
    <div id="compartmentModal" class="modal-overlay">
        <div class="modal-content">
            <h3 class="modal-title">Add New Compartment</h3>
            <div class="input-group">
                <label>Compartment Name</label>
                <input type="text" id="compName" placeholder="e.g. Main Compartment, Top Lid">
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal('compartmentModal')">Cancel</button>
                <button class="btn-save" onclick="saveCompartment()">Save</button>
            </div>
        </div>
    </div>

    <!-- Gear Modal -->
    <div id="gearModal" class="modal-overlay">
        <div class="modal-content">
            <h3 class="modal-title">Add Gear to <span id="currentCompName" style="color:#ff3d00;"></span></h3>
            <div class="input-group">
                <label>Gear Name</label>
                <input type="text" id="gearName" placeholder="e.g. DJI Mini 4 Pro">
            </div>
            <div class="input-group">
                <label>Weight (Grams) - Optional</label>
                <input type="number" id="gearWeight" placeholder="e.g. 249">
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal('gearModal')">Cancel</button>
                <button class="btn-save" onclick="saveGear()">Add Gear</button>
            </div>
        </div>
    </div>

    <script src="logic.js"></script>
</body>
</html>
