<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;800&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="module-header">
        <div class="module-title">🎒 Bag Layouts</div>
    </div>

    <!-- ব্যাগ সিলেক্টর ট্যাব -->
    <div class="bag-selector" id="bagTabsContainer">
        <!-- JS দিয়ে ডাইনামিকভাবে আসবে -->
    </div>

    <!-- মূল বডি -->
    <div class="bag-container" id="mainBagContainer">
        <div class="empty-message">Loading bag layouts...</div>
    </div>

    <!-- Add Compartment Modal -->
    <div id="compartmentModal" class="modal-overlay">
        <div class="modal-content">
            <h3 class="modal-title">New Compartment</h3>
            <div class="input-group">
                <label>Compartment Name</label>
                <input type="text" id="compartmentName" placeholder="e.g. Main Chamber, Top Lid, Front Pocket">
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal('compartmentModal')">Cancel</button>
                <button class="btn-save" onclick="saveCompartment()">Save Compartment</button>
            </div>
        </div>
    </div>

    <!-- Add Item Modal -->
    <div id="itemModal" class="modal-overlay">
        <div class="modal-content">
            <h3 class="modal-title">Add Item to Compartment</h3>
            <div class="input-group">
                <label>Item Name</label>
                <input type="text" id="packItemName" placeholder="e.g. Sleeping Bag, Winter Jacket">
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal('itemModal')">Cancel</button>
                <button class="btn-save" onclick="savePackItem()">Add Item</button>
            </div>
        </div>
    </div>

    <script src="logic.js"></script>
</body>
</html>
